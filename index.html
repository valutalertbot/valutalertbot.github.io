<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ValutBot - уведомления о курсах в Telegram</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #fff;
        text-align: center;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 64px 20px;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #cbd5e1;
        line-height: 1.6;
      }
      .btn {
        display: inline-block;
        margin-top: 24px;
        padding: 14px 28px;
        background: #38bdf8;
        color: #0f172a;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 700;
        transition: transform 0.3s ease;
      }
      .btn:hover {
        transform: scale(1.05);
      }
      .features {
        margin-top: 48px;
        display: grid;
        gap: 16px;
      }
      .card {
        background: rgba(255, 255, 255, 0.06);
        padding: 20px;
        border-radius: 16px;
        transition: transform 0.3s ease;
      }
      .card:hover {
        transform: translateY(-5px);
      }
      .logo {
        background: #fff;
        padding: 8px;
        border-radius: 25%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="logo.png" alt="ValutBot Logo" width="120" class="logo" />
      <h1>ValutBot</h1>
      <p>
        Следи за курсами валют и криптовалют прямо в Telegram и получай
        уведомления, когда цена достигнет нужного уровня.
      </p>

      <a class="btn" href="https://t.me/ValutAlertBot?start=f_site"
        >Открыть в Telegram</a
      >

      <div class="features">
        <div class="card">🔔 Гибкие уведомления по курсу</div>
        <div class="card">⭐ Premium с расширенными возможностями</div>
        <div class="card">📈 Поддержка популярных валют и криптовалют</div>
      </div>
    </div>
  </body>
</html>
